<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio design</title>
    <link rel="icon" type="image/png" href="../../favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="zine-header">
      <nav class="zine-header-nav">
        <a href="../../experiments.html" class="zine-back">← experiments</a>
      </nav>
      <h1>PORTFOLIO DESIGN</h1>
      <p>
        Show off images in a lightweight, modern photo viewer. Structured in
        different layouts, e.g. show multiple images next to each other, single
        ones in full size, etc.
      </p>
      <p>Also lighten up the design with text inbetween.</p>
    </header>

    <section class="upload-zone" id="upload-zone">
      <!-- default state -->
      <div class="upload-prompt" id="upload-prompt">
        <p class="upload-hint">try it with your own images</p>
        <div class="upload-actions">
          <label class="upload-btn" for="file-input">choose photos</label>
          <input type="file" id="file-input" multiple accept="image/*" hidden />
          <span class="upload-drag-hint">or drag &amp; drop here</span>
        </div>
      </div>
      <!-- active state — shown after upload -->
      <div class="upload-active" id="upload-active" hidden>
        <p class="upload-hint" id="upload-count"></p>
        <div class="upload-actions">
          <label class="upload-btn" for="file-input">choose different</label>
          <button class="upload-reset-btn" id="reset-btn">reset to default</button>
        </div>
      </div>
    </section>

    <main id="zine-container" class="zine-container"></main>

    <script src="pfdesign.js"></script>
  </body>
</html>
