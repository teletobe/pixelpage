name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: experiments/dialektr/package-lock.json

      - name: Build dialektr
        working-directory: experiments/dialektr
        run: |
          npm ci
          npm run build
          echo "=== dist contents ==="
          ls -la dist/
          ls -la dist/assets/

      # Assemble the site: put the built app in first, then rsync the rest
      # of the static site around it (excluding the dialektr source tree).
      - name: Assemble site
        run: |
          mkdir -p _site/experiments/dialektr
          cp -r experiments/dialektr/dist/. _site/experiments/dialektr/
          echo "=== _site/experiments/dialektr after cp ==="
          ls -la _site/experiments/dialektr/
          ls -la _site/experiments/dialektr/assets/ || echo "NO assets dir!"
          rsync -a \
            --exclude=_site \
            --exclude=.git \
            --exclude=.github \
            --exclude=experiments/dialektr \
            . _site/
          echo "=== index.html AFTER rsync (should show assets/..., NOT src/main.ts) ==="
          grep "script" _site/experiments/dialektr/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
