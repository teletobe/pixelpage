name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: experiments/dialektr/package-lock.json

      - name: Build dialektr
        working-directory: experiments/dialektr
        run: npm ci && npm run build

      # The rest of the site is plain HTML — rsync everything except build
      # artifacts and the output folder itself, then drop in the built app.
      - name: Assemble site
        run: |
          rsync -a \
            --exclude=_site \
            --exclude=.git \
            --exclude=.github \
            --exclude=experiments/dialektr/node_modules \
            --exclude=experiments/dialektr/src \
            --exclude=experiments/dialektr/dist \
            . _site/
          # drop the Vite build output in place of the raw source
          cp -r experiments/dialektr/dist/. _site/experiments/dialektr/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
